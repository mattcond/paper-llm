services:
  opendataloader:
    image: ghcr.io/opendataloader-project/opendataloader-pdf-hybrid:latest
    container_name: opendataloader
    ports:
      - "2000:8000"
    environment:
      - ODL_HOST=localhost
      - ODL_PORT=8000
      - ODL_LOG_LEVEL=info
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped